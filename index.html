<!DOCTYPE html>
<html lang="en" data-theme="dark"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emoji Kitchen — Mashup Creator | QuickUtils</title>
    <meta name="keywords" content="QuickUtils, emoji, kitchen, code, design, productivity, online tools">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://quickutils.top/emoji-kitchen/">
    <meta property="og:title" content="Emoji Kitchen — Mashup Creator | QuickUtils">
    <meta property="og:description" content="Combine two emojis to create fun mashups. Download, copy, and share your emoji creations.">
    <meta property="og:url" content="https://quickutils.top/emoji-kitchen/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
<meta name="description" content="Combine two emojis to create fun mashups. Download, copy, and share your emoji creations.">
<link rel="stylesheet" href="style.css"></head>
<body><nav class="navbar"><div class="container nav-inner"><a href="https://quickutils.top" class="brand">😄 Emoji Kitchen</a><div class="nav-links"><button class="btn btn-sm btn-secondary" id="randomBtn">🎲 Random</button><button class="btn btn-sm btn-secondary" id="downloadBtn">📥 Download</button><button id="themeBtn" class="theme-btn">🌙</button></div></div></nav>
<main class="container" style="margin-top:1.5rem">
<div class="hero glass-card text-center"><h1 class="gradient-text">Emoji Kitchen</h1><p class="text-muted">Pick two emojis and mash them together!</p></div>
<div class="mashup-area" style="margin-top:1.5rem">
    <div class="pick-section glass-card">
        <h3>Pick Emoji 1</h3>
        <input type="text" id="search1" placeholder="🔍 Search...">
        <div class="emoji-grid" id="grid1"></div>
        <div class="selected-emoji" id="sel1">❓</div>
    </div>
    <div class="result-section glass-card">
        <h3 class="text-center">✨ Mashup</h3>
        <canvas id="mashupCanvas" width="200" height="200"></canvas>
        <p id="mashupLabel" class="text-center text-muted" style="margin-top:.5rem">Pick two emojis!</p>
    </div>
    <div class="pick-section glass-card">
        <h3>Pick Emoji 2</h3>
        <input type="text" id="search2" placeholder="🔍 Search...">
        <div class="emoji-grid" id="grid2"></div>
        <div class="selected-emoji" id="sel2">❓</div>
    </div>
</div>
<section class="glass-card" style="margin-top:1.5rem"><h3>📜 History</h3><div id="history" class="history-grid"></div></section>
</main>
<script src="script.js"></script></body></html>
